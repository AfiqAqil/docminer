[project]
name = "docminer"
version = "0.1.0"
description = "Schema-driven document extraction from images and PDFs"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "pydantic>=2.0",
    "litellm>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/docminer"]
